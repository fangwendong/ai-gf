<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#c04f68">
    <title>AI女友</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Story Companion Game</p>
          <h1>AI女友</h1>
        </div>
        <div class="status-strip" aria-label="关系状态">
          <span id="dayText">第 1 天</span>
          <span id="stageText">相遇</span>
          <span id="moodText">平静</span>
        </div>
      </header>

      <main class="game-layout">
        <section class="room-panel" aria-label="共同生活房间">
          <div class="room-scene" id="roomScene">
            <div class="window">
              <span class="moon"></span>
              <span class="star star-a"></span>
              <span class="star star-b"></span>
              <span class="star star-c"></span>
            </div>
            <div class="shelf">
              <button class="room-item locked" data-item="vinyl" type="button" aria-label="唱片">♪</button>
              <button class="room-item locked" data-item="mug" type="button" aria-label="热牛奶">☕</button>
              <button class="room-item locked" data-item="photo" type="button" aria-label="合照">□</button>
            </div>
            <div class="portrait-card" aria-label="林栖照片">
              <img src="assets/girlfriend-portrait.jpg" alt="林栖">
              <div class="portrait-caption">
                <strong>林栖</strong>
                <span>22:41 在线</span>
              </div>
            </div>
            <div class="desk">
              <span class="lamp"></span>
              <span class="book"></span>
            </div>
          </div>

          <div class="meters">
            <div>
              <span>亲密</span>
              <meter id="closenessMeter" min="0" max="100" value="12"></meter>
            </div>
            <div>
              <span>信任</span>
              <meter id="trustMeter" min="0" max="100" value="10"></meter>
            </div>
            <div>
              <span>压力</span>
              <meter id="stressMeter" min="0" max="100" value="20"></meter>
            </div>
          </div>
        </section>

        <section class="interaction-panel" aria-label="互动">
          <div class="story-panel" aria-label="剧情章节">
            <p class="story-kicker" id="chapterKicker">Chapter 01</p>
            <h2 id="chapterTitle">雨夜来信</h2>
            <p id="storyText"></p>
            <div class="story-choices" id="storyChoices"></div>
          </div>

          <div class="dialogue" id="dialogue" aria-live="polite"></div>

          <form class="chat-form" id="chatForm">
            <label class="sr-only" for="chatInput">和林栖说话</label>
            <input id="chatInput" maxlength="80" autocomplete="off" placeholder="输入一句话，例如：今天有点累">
            <button type="submit">发送</button>
          </form>

          <div class="actions" aria-label="陪伴行动">
            <button data-action="morning" type="button">早安</button>
            <button data-action="night" type="button">晚安</button>
            <button data-action="stress" type="button">有点累</button>
            <button data-action="music" type="button">听歌</button>
            <button data-action="promise" type="button">做约定</button>
            <button data-action="gift" type="button">送礼物</button>
          </div>
        </section>

        <aside class="memory-panel" aria-label="记忆与日记">
          <nav class="tabs" aria-label="信息页签">
            <button class="active" data-tab="memories" type="button">记忆</button>
            <button data-tab="diary" type="button">日记</button>
            <button data-tab="promises" type="button">约定</button>
          </nav>
          <div class="tab-content active" id="tab-memories"></div>
          <div class="tab-content" id="tab-diary"></div>
          <div class="tab-content" id="tab-promises"></div>
        </aside>
      </main>
    </div>

    <script src="src/app.js" type="module"></script>
  </body>
</html>
